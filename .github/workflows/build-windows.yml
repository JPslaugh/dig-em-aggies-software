name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PyQt5>=5.15 pymodbus>=3.0 paho-mqtt>=1.6 matplotlib>=3.5 pyinstaller

      - name: Build executable
        working-directory: operator-station/digem-operator-ui
        run: |
          pyinstaller --onefile --windowed --name "DiGEM-Operator-UI" --icon assets/logo.png main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiGEM-Operator-UI-Windows
          path: operator-station/digem-operator-ui/dist/DiGEM-Operator-UI.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: operator-station/digem-operator-ui/dist/DiGEM-Operator-UI.exe
