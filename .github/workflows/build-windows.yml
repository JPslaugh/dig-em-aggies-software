name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: DiGEM-Operator-UI.exe
            pyinstaller_args: --onefile --windowed --name DiGEM-Operator-UI --icon assets/logo.png main.py
          - os: ubuntu-latest
            name: Linux
            artifact: DiGEM-Operator-UI-Linux
            pyinstaller_args: --onefile --name DiGEM-Operator-UI-Linux main.py
          - os: macos-latest
            name: macOS
            artifact: DiGEM-Operator-UI-macOS
            pyinstaller_args: --onefile --windowed --name DiGEM-Operator-UI-macOS --icon assets/logo.png main.py

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyQt5>=5.15 pymodbus>=3.0 paho-mqtt>=1.6 matplotlib>=3.5 pyinstaller

      - name: Build executable
        working-directory: operator-station/digem-operator-ui
        run: pyinstaller ${{ matrix.pyinstaller_args }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiGEM-Operator-UI-${{ matrix.name }}
          path: operator-station/digem-operator-ui/dist/${{ matrix.artifact }}

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: operator-station/digem-operator-ui/dist/${{ matrix.artifact }}
